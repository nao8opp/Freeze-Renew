name: 🎮 FreezeHost 自动续期
on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:
jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 💾 获取 Playwright 版本
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: 📁 缓存 Playwright 浏览器
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: 🌐 安装 Playwright 浏览器
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 Hysteria2 代理转发
        if: ${{ env.HY2_PROXY != '' }}
        env:
          HY2_PROXY: ${{ secrets.HY2_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/apernet/hysteria/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          echo "📦 Hysteria2 版本: $VERSION"
          wget -q "https://github.com/apernet/hysteria/releases/download/${VERSION}/hysteria-linux-amd64" \
            -O hysteria
          chmod +x hysteria

          # 生成客户端配置，HTTP 代理监听在 :8080，与原 GOST 端口保持一致
          cat > hy2-client.yaml << EOF
          server: "$HY2_PROXY"
          http:
            listen: 127.0.0.1:8080
          EOF

          nohup ./hysteria client -c hy2-client.yaml > hy2.log 2>&1 &
          sleep 3
          echo "✅ Hysteria2 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🚀 运行续期脚本
        env:
          DISCORD_TOKEN:   ${{ secrets.DISCORD_TOKEN }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7
